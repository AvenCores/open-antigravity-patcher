name: Build Go

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - goos: windows
            goarch: amd64
            output: Open_AG_Patcher_Windows.exe
          - goos: windows
            goarch: 386
            output: Open_AG_Patcher_Windows_x86.exe
          - goos: windows
            goarch: arm64
            output: Open_AG_Patcher_Windows_arm64.exe
          # Linux
          - goos: linux
            goarch: amd64
            output: open_ag_patcher_linux_x64
          - goos: linux
            goarch: arm64
            output: open_ag_patcher_linux_arm64
          # macOS
          - goos: darwin
            goarch: amd64
            output: open_ag_patcher_macos_intel
          - goos: darwin
            goarch: arm64
            output: open_ag_patcher_macos_arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - name: Install go-winres
        if: matrix.goos == 'windows'
        run: go install github.com/tc-hib/go-winres@latest
        working-directory: src-go

      - name: Compile Windows resources (icon, metadata, UAC)
        if: matrix.goos == 'windows'
        run: go-winres make
        working-directory: src-go

      - name: Fetch dependencies
        run: go mod tidy
        working-directory: src-go

      - name: Build binary
        run: go build -ldflags="-s -w" -o dist/${{ matrix.output }}
        working-directory: src-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: src-go/dist/${{ matrix.output }}
          if-no-files-found: error


